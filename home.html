<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Walpi Wallpaper Discovery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Walpi</h1>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search for wallpapers..." class="search-bar">
                    <button id="searchBtn" class="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <nav class="nav-links">
                    <a href="home.html" class="nav-link active">Home</a>
                    <a href="categories.html" class="nav-link">Categories</a>
                    <a href="trending.html" class="nav-link">Trending</a>
                </nav>
                <div class="user-section">
                    <div class="username-selector" id="usernameSelector">
                        <input type="text" id="usernameInput" placeholder="Enter username..." class="username-input">
                        <button id="setUsernameBtn" class="set-username-btn">Set</button>
                    </div>
                    <div id="userDisplay" class="user-display hidden">
                        <span id="currentUsername" class="username"></span>
                        <button id="adminPanelBtn" class="admin-btn hidden">Admin Panel</button>
                        <button id="logoutBtn" class="logout-btn">Logout</button>
                    </div>
                </div>
                <button id="darkModeToggle" class="dark-mode-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Hero Section -->
            <section class="hero-section">
                <h2 class="hero-title">Discover Beautiful Wallpapers</h2>
                <p class="hero-description">Explore our curated collection of stunning wallpapers for your desktop and mobile devices.</p>
            </section>

            <!-- Wallpaper Grid View -->
            <div id="gridView" class="wallpaper-grid">
                <div class="grid-header">
                    <h2>Latest Wallpapers</h2>
                    <div class="filter-tags">
                        <button class="tag active" data-category="all">All</button>
                        <button class="tag" data-category="nature">Nature</button>
                        <button class="tag" data-category="anime">Anime</button>
                        <button class="tag" data-category="minimal">Minimal</button>
                        <button class="tag" data-category="abstract">Abstract</button>
                    </div>
                </div>
                <div id="wallpaperGrid" class="grid">
                    <!-- Wallpapers will be dynamically loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel hidden">
        <div class="admin-overlay" onclick="closeAdminPanel()"></div>
        <div class="admin-content">
            <div class="admin-header">
                <h2>Admin Panel</h2>
                <button onclick="closeAdminPanel()" class="close-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="upload">Upload Wallpaper</button>
                <button class="admin-tab" data-tab="edit">Edit Blog</button>
            </div>
            
            <div class="admin-body">
                <!-- Upload Tab -->
                <div id="uploadTab" class="admin-tab-content active">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="adminTitle" placeholder="Enter wallpaper title...">
                    </div>
                    
                    <div class="form-group">
                        <label>Category</label>
                        <select id="adminCategory">
                            <option value="nature">Nature</option>
                            <option value="anime">Anime</option>
                            <option value="minimal">Minimal</option>
                            <option value="abstract">Abstract</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Tags (comma-separated)</label>
                        <input type="text" id="adminTags" placeholder="nature, landscape, mountains...">
                    </div>
                    
                    <div class="form-group">
                        <label>Image</label>
                        <input type="file" id="adminImage" accept="image/*">
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Alt Text</label>
                        <input type="text" id="adminAlt" placeholder="Describe the image for accessibility...">
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="adminDescription" rows="3" placeholder="Brief description..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Blog Content</label>
                        <textarea id="adminBlog" rows="6" placeholder="Detailed blog content about this wallpaper..."></textarea>
                    </div>
                    
                    <button onclick="uploadWallpaper()" class="admin-submit-btn">Upload Wallpaper</button>
                </div>
                
                <!-- Edit Blog Tab -->
                <div id="editTab" class="admin-tab-content">
                    <div class="form-group">
                        <label>Select Wallpaper to Edit</label>
                        <select id="wallpaperSelect">
                            <option value="">Choose a wallpaper...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Blog Content</label>
                        <textarea id="editBlogContent" rows="10" placeholder="Edit the blog content..."></textarea>
                    </div>
                    
                    <button onclick="updateBlogContent()" class="admin-submit-btn">Update Blog</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Walpi. Discover and download beautiful wallpapers.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
